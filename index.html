<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Random Pixel Character</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#eee;
}

.character{
position:relative;
width:128px;
height:128px;
margin:auto;
image-rendering:pixelated;
}

.character img{
position:absolute;
width:128px;
height:128px;
left:0;
top:0;
image-rendering:pixelated;
}

button{
font-size:18px;
padding:10px 20px;
margin-top:20px;
}

</style>
</head>

<body>

<h1>32px キャラメーカー</h1>

<div class="character">

<img id="body">
<img id="hair">
<img id="eyes">

</div>

<button onclick="make()">ランダム生成</button>

<script>

const bodyParts=[
"parts/body/body1.png",
"parts/body/body2.png",
"parts/body/body3.png"
]

const hairParts=[
"parts/hair/hair1.png",
"parts/hair/hair2.png",
"parts/hair/hair3.png"
]

const eyesParts=[
"parts/eyes/eyes1.png",
"parts/eyes/eyes2.png",
"parts/eyes/eyes3.png"
]

function rand(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function make(){

document.getElementById("body").src=rand(bodyParts)
document.getElementById("hair").src=rand(hairParts)
document.getElementById("eyes").src=rand(eyesParts)

}

make()

</script>

</body>
</html>
